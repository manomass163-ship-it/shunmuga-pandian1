.<!DOCTYPE html>
<html>
<head>

<title>PSN College Chatbot</title>

<<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>PSN College Chatbot</h1>

<form method="POST">

<input type="text"
name="question"
placeholder="Ask about students, courses or fees"
required>

<br><br>

<button type="submit">Send</button>

</form>

<div class="chatbox">

<h3>Bot Reply</h3>

<p>{{ answer|safe }}</p>

</div>

</div>

</body>

</html>
